<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калькулятор слоев камня v1.1</title>
 <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f17">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-title" content="Слои">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
body{font-family:Arial,sans-serif;max-width:900px;margin:0 auto;padding:16px;background:#0b0f17;color:#e8eefc}
input,button{width:100%;padding:12px;margin:6px 0;box-sizing:border-box;font-size:16px}
button{background:#1e88e5;color:#fff;border:none;border-radius:12px;font-weight:bold}
.card{border:1px solid #2a3344;border-radius:20px;padding:16px;margin:14px 0;background:#151c28;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.selected{border:3px solid #2ecc71!important;background:#13281d!important}
.big{font-size:42px;font-weight:bold;text-align:center}
.visual{font-family:monospace;white-space:pre;background:#151c28;color:#e8eefc;padding:12px;border-radius:12px;border:1px solid #2a3344;width:100%;box-sizing:border-box}
.best{border-color:#1976d2}
@media(prefers-color-scheme:dark){
body{background:#111;color:#eee}
.card{background:#1d1d1d}
.visual{background:#222}
input,button{border:1px solid #666}
.selected{background:#17351d!important}
}
</style>
</head>
<body>

<h2>Калькулятор слоев камня</h2>

<label>Корка (мм)</label>
<input id="corka" type="number">

<label>Граница добычи (мм)</label>
<input id="limit" type="number">

<button onclick="calc()">Подобрать слои</button>

<div id="results"></div><div id="selectedInfo"></div>

<div id="capSection" style="display:none;">
<h3>Расчет шапки</h3>
<label>Полная высота камня (мм)</label>
<input id="stoneHeight" type="number">
<button onclick="calcCap()">Рассчитать шапку</button>
<div id="capResult"></div>
</div>

<button onclick="resetAll()">Новый камень</button>

<script>
let selectedTotal=null;
let selectedCorka=null;
let selectedLayers=[];

function calc(){
const corka=Number(document.getElementById('corka').value);
const limit=Number(document.getElementById('limit').value);

if(!corka||!limit||limit<=corka){alert('Проверь значения');return;}

const target=limit-corka;
let variants=[];

for(let a=0;a<=20;a++){
 for(let b=0;b<=20;b++){
  if(a===0&&b===0) continue;
  const total=a*410+b*310;
  const diff=total-target;
  if(Math.abs(diff)<=120){
   let layers=[];
   for(let i=0;i<a;i++) layers.push(410);
   for(let i=0;i<b;i++) layers.push(310);
   variants.push({layers,total,diff});
  }
 }
}

variants.sort((x,y)=>{
 if(Math.abs(x.diff)!==Math.abs(y.diff))
   return Math.abs(x.diff)-Math.abs(y.diff);
 return x.layers.length-y.layers.length;
});

variants=variants.slice(0,10);

const results=document.getElementById('results');
results.innerHTML='';

variants.forEach((v,index)=>{
 let visual='┌─────┐\n';
 for(let i=v.layers.length-1;i>=0;i--){
   visual+='│'+String(v.layers[i]).padEnd(5)+'│\n';
   if(i!==0) visual+='├─────┤\n';
 }
 visual+='├──────────────┤\n│Корка '+corka+'│\n└──────────────┘';

 let status='';
if(v.diff===0){
 status='🏆 <span style="color:#f7c948;font-weight:bold">Точное попадание</span>';
}else if(v.diff>0){
 status=`🔴 Перелёт: ${v.diff} мм`;
}else{
 status=`🟢 Недолёт: ${Math.abs(v.diff)} мм`;
}

 const div=document.createElement('div');
 div.className='card'+(index===0?' best':'');

 div.innerHTML=`
 <b>Вариант ${index+1}</b><br><br>
 ${v.layers.join(' + ')}<br><br>
 Высота с коркой: <b>${v.total + corka} мм</b><br><span style="opacity:.6;font-size:12px">Слои: ${v.total} мм</span><br>
 ${status}<br><br>
 <div class="visual">${visual}</div><br>
 <button onclick="selectVariant(this,${v.total}, '${v.layers.join(",")}')">Выбрать</button>`;

 results.appendChild(div);
});
}

function selectVariant(btn,total,layersStr){
document.querySelectorAll('.card').forEach(c=>c.classList.remove('selected'));
document.querySelectorAll('.card button').forEach(b=>b.textContent='Выбрать');

const card=btn.closest('.card');
card.classList.add('selected');
btn.textContent='✓ Выбрано';

selectedTotal=total;
selectedLayers=layersStr.split(',').map(Number);
selectedCorka=Number(document.getElementById('corka').value);

document.getElementById('selectedInfo').innerHTML=`
<div class="card selected">
<h3 style="margin-top:0">Выбран набор</h3>
${selectedLayers.join(' + ')}<br><br>
<b>Высота с коркой: ${selectedTotal + selectedCorka} мм</b>
</div>`;
document.getElementById('capSection').style.display='block';

document.querySelectorAll('#results .card').forEach(c=>{
 if(c!==card) c.style.display='none';
});
}

function calcCap(){
const stone=Number(document.getElementById('stoneHeight').value);
if(!stone||selectedTotal===null){alert('Нет данных');return;}

const cap=stone-selectedCorka-selectedTotal;

let visual='┌──────────────┐\n';
visual+='│Шапка '+cap+'│\n';
visual+='├──────────────┤\n';
for(let i=selectedLayers.length-1;i>=0;i--){
 visual+='│'+String(selectedLayers[i]).padEnd(12)+'│\n';
 visual+='├──────────────┤\n';
}
visual+='│Корка '+selectedCorka+'│\n└──────────────┘';

document.getElementById('capResult').innerHTML=`
<div class="card selected">
Высота камня: ${stone} мм<br>
Корка: ${selectedCorka} мм<br>
Слои: ${selectedTotal} мм<br><br>
<div class="big">${cap} мм</div>
<div style="text-align:center;margin-bottom:12px;">Шапка</div>
<div class="visual">${visual}</div>
</div>`;
}

function resetAll(){
if(!confirm('Очистить все данные?')) return;

location.reload();
}
</script>
 <script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js');
  });
}
</script>
</body>
</html>
